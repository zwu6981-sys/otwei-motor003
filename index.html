<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速啟動 - 精細動作訓練</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020617; font-family: system-ui, -apple-system, sans-serif; }
        #video-container { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; transform: scaleX(-1); }
        video { display: none; }
        
        /* 輕量化儀表板 */
        .dashboard {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px);
            padding: 15px; border-radius: 12px; color: white; border: 1px solid rgba(255,255,255,0.1);
        }
        /* 指令提示區 */
        .instruction-box {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: white; padding: 12px 24px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 10px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        /* 啟動狀態提示 */
        #status-overlay {
            position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; color: white; transition: opacity 0.5s;
        }
        .loader {
            width: 40px; height: 40px; border: 3px solid #3b82f6; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="status-overlay">
    <div class="loader"></div>
    <p id="status-text">正在初始化 AI 模型...</p>
</div>

<div class="dashboard">
    <div class="text-sm text-blue-300 font-bold mb-2">訓練紀錄</div>
    <div class="flex justify-between gap-8 mb-1 text-xs text-gray-400">
        <span>成功次數</span><span id="score" class="text-yellow-400 font-mono text-base">0</span>
    </div>
    <div class="flex justify-between gap-8 text-xs text-gray-400">
        <span>平均反應</span><span id="avgTime" class="text-green-400 font-mono text-base">--</span>
    </div>
    <button id="restartBtn" class="mt-4 w-full bg-blue-600 text-xs py-2 rounded-lg hover:bg-blue-500 transition-colors">重新開始</button>
</div>

<div class="instruction-box" id="instructionBox">
    <div id="instructionIndicator" class="dot"></div>
    <span id="instructionText">請稍候...</span>
</div>

<div id="video-container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusOverlay = document.getElementById('status-overlay');
    const statusText = document.getElementById('status-text');

    // 臨床數據與遊戲狀態
    let score = 0;
    let totalTime = 0;
    let ballStartTime = Date.now();
    let particles = [];
    let smoothedLandmarks = {};
    const SMOOTHING = 0.7; // 數值越高，反應越快但顫抖過濾較少

    const TYPES = {
        BLUE: { id: 'pincer', color: '#3b82f6', label: '拇指 + 食指 (對位捏)', lms: [4, 8], threshold: 25 },
        RED: { id: 'tripod', color: '#ef4444', label: '拇指 + 食指 + 中指 (抓握)', lms: [4, 8, 12], threshold: 35 },
        GREEN: { id: 'oppose', color: '#22c55e', label: '拇指 + 小指 (對掌練習)', lms: [4, 20], threshold: 25 }
    };
    let currentTask = TYPES.BLUE;
    let ball = { x: 0.5, y: 0.5, active: false };

    // 初始化：生成球
    function spawn() {
        const keys = Object.keys(TYPES);
        currentTask = TYPES[keys[Math.floor(Math.random() * keys.length)]];
        document.getElementById('instructionText').innerText = currentTask.label;
        document.getElementById('instructionIndicator').style.backgroundColor = currentTask.color;
        ball = { x: Math.random() * 0.6 + 0.2, y: Math.random() * 0.6 + 0.2, active: true };
        ballStartTime = Date.now();
    }

    // 重置遊戲
    document.getElementById('restartBtn').onclick = () => {
        score = 0; totalTime = 0;
        document.getElementById('score').innerText = '0';
        document.getElementById('avgTime').innerText = '--';
        spawn();
    };

    function onResults(results) {
        if (statusOverlay.style.opacity !== '0') {
            statusOverlay.style.opacity = '0';
            setTimeout(() => statusOverlay.style.display = 'none', 500);
            spawn();
        }

        const w = canvasElement.width = window.innerWidth;
        const h = canvasElement.height = window.innerHeight;
        
        // 1. 繪製純代碼生成的虛擬背景 (速度極快)
        const bgGrad = canvasCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
        bgGrad.addColorStop(0, '#1e293b');
        bgGrad.addColorStop(1, '#020617');
        canvasCtx.fillStyle = bgGrad;
        canvasCtx.fillRect(0, 0, w, h);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const hand = results.multiHandLandmarks[0];
            
            // 骨架繪製
            canvasCtx.strokeStyle = 'rgba(255,255,255,0.15)';
            canvasCtx.lineWidth = 2;
            // 簡易骨架連線邏輯
            const connections = [[0,1,2,3,4], [0,5,6,7,8], [5,9,13,17], [0,17,18,19,20], [9,10,11,12], [13,14,15,16]];
            connections.forEach(path => {
                canvasCtx.beginPath();
                path.forEach((idx, i) => {
                    if(i===0) canvasCtx.moveTo(hand[idx].x*w, hand[idx].y*h);
                    else canvasCtx.lineTo(hand[idx].x*w, hand[idx].y*h);
                });
                canvasCtx.stroke();
            });

            // 平滑化關鍵點
            let midX = 0, midY = 0;
            let isPinching = true;
            const thumbTip = hand[4];

            currentTask.lms.forEach(idx => {
                const raw = hand[idx];
                if(!smoothedLandmarks[idx]) smoothedLandmarks[idx] = {x: raw.x, y: raw.y};
                smoothedLandmarks[idx].x = smoothedLandmarks[idx].x * (1-SMOOTHING) + raw.x * SMOOTHING;
                smoothedLandmarks[idx].y = smoothedLandmarks[idx].y * (1-SMOOTHING) + raw.y * SMOOTHING;
                
                midX += smoothedLandmarks[idx].x;
                midY += smoothedLandmarks[idx].y;

                if (idx !== 4) {
                    const d = Math.hypot((raw.x - thumbTip.x)*w, (raw.y - thumbTip.y)*h);
                    if (d > currentTask.threshold) isPinching = false;
                }
            });
            midX /= currentTask.lms.length; midY /= currentTask.lms.length;

            // 能量球互動
            if (ball.active) {
                const bX = ball.x * w, bY = ball.y * h;
                const dist = Math.hypot(bX - midX*w, bY - midY*h);

                // 接近提示
                if (dist < 150) {
                    canvasCtx.beginPath();
                    canvasCtx.arc(bX, bY, 40 + Math.sin(Date.now()/100)*10, 0, Math.PI*2);
                    canvasCtx.strokeStyle = currentTask.color;
                    canvasCtx.globalAlpha = 1 - dist/150;
                    canvasCtx.stroke();
                    canvasCtx.globalAlpha = 1;
                }

                // 成功捕捉
                if (isPinching && dist < 45) {
                    ball.active = false;
                    score++;
                    totalTime += (Date.now() - ballStartTime)/1000;
                    document.getElementById('score').innerText = score;
                    document.getElementById('avgTime').innerText = (totalTime/score).toFixed(1) + 's';
                    
                    // 特效與聲音
                    explode(bX, bY, currentTask.color);
                    beep();
                    setTimeout(spawn, 1000);
                }

                // 繪製球體
                canvasCtx.shadowBlur = 15; canvasCtx.shadowColor = currentTask.color;
                canvasCtx.fillStyle = currentTask.color;
                canvasCtx.beginPath(); canvasCtx.arc(bX, bY, 20, 0, Math.PI*2); canvasCtx.fill();
                canvasCtx.shadowBlur = 0;
            }
        }

        // 更新粒子
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
            canvasCtx.fillStyle = p.color; canvasCtx.globalAlpha = p.life;
            canvasCtx.fillRect(p.x, p.y, 3, 3);
        });
        canvasCtx.globalAlpha = 1;
    }

    function explode(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push({x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color});
        }
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 800; g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    // MediaPipe 啟動
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6}); // modelComplexity: 0 最快
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480 // 降低解析度以提升處理速度
    });
    
    // 監聽相機權限異常
    camera.start().catch(err => {
        statusText.innerText = "無法開啟相機，請檢查權限設定。";
    });
</script>
</body>
</html>
